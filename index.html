<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semih's Blog</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            color: #333;
        }

        /* Intro Section */
        .intro {
            position: relative;
            height: 100vh;
            overflow: hidden;
        }

        .intro video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Scroll Down Icon */
        .scroll-down {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            text-align: center;
            color: #110545;
            cursor: pointer;
            animation: bounce 1.5s infinite;
        }

        .scroll-down::after {
            content: "↓";
            display: block;
            font-size: 24px;
            margin-top: 5px;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translate(-50%, 0); }
            40% { transform: translate(-50%, -10px); }
            60% { transform: translate(-50%, -5px); }
        }

        /* Sections */
        section {
            padding: 50px;
            max-width: 900px;
            margin: auto;
        }

        h2 {
            margin-top: 0;
        }

        /* Projects Grid */
        .projects {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .project-card {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            transition: transform 0.2s ease;
        }

        .project-card:hover {
            transform: scale(1.03);
        }
    </style>
</head>
<body>

    <!-- Intro Video -->
    <div class="intro">
        <video src="semihvideo.mp4" autoplay muted loop playsinline></video>
        <div class="scroll-down" onclick="scrollToContent()">Scroll Down</div>
    </div>

    <!-- Personal Statement -->
    <section>
        <h2>About Me</h2>
        <p>Hi, I’m Semih. Welcome to my personal blog where I share my thoughts, experiences, and projects. This space is a mix of personal reflections and creative work.</p>
    </section>

    <!-- Projects -->
    <section>
        <h2>Projects</h2>
        <div class="projects">
            <div class="project-card">Project 1 - Description</div>
            <div class="project-card">Project 2 - Description</div>
            <div class="project-card">Project 3 - Description</div>
        </div>
    </section>

    <script>
        function scrollToContent() {
            window.scrollTo({ top: window.innerHeight, behavior: 'smooth' });
        }
    </script>

</body>
</html>
