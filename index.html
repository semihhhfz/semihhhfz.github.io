<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semih Fazlıoğlu | Portfolio</title>
    <style>
        /* Genel sıfırlama */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Times New Roman', serif;
            color: #333;
            scroll-behavior: smooth;
        }

        /* Hero Section */
        .hero {
            position: relative;
            height: 100vh;
            width: 100%;
            overflow: hidden;
        }

        .hero video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
        }

        .scroll-down {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 18px;
            background: rgba(255,255,255,0.2);
            padding: 10px 20px;
            border-radius: 30px;
            border: 1px solid white;
            cursor: pointer;
            transition: background 0.3s;
        }

        .scroll-down:hover {
            background: rgba(255,255,255,0.4);
        }

        /* Personal Statement */
        .personal {
            min-height: 100vh;
            background: #f5efe6;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 50px;
            font-size: 2rem;
            box-shadow: inset 0px 0px 30px rgba(0,0,0,0.2);
        }

        /* Projects Section */
        .projects {
            padding: 50px 20px;
            background: #fafafa;
        }

        .projects h2 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5rem;
        }

        .projects ul {
            max-width: 800px;
            margin: 0 auto;
            list-style: none;
        }

        .projects li {
            background: white;
            padding: 15px 20px;
            margin: 10px 0;
            border-radius: 10px;
            box-shadow: 0px 4px 8px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .projects li:hover {
            transform: translateY(-5px);
            box-shadow: 0px 8px 16px rgba(0,0,0,0.2);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .personal {
                font-size: 1.5rem;
                padding: 30px;
            }

            .projects h2 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

    <!-- Hero Section -->
    <section class="hero">
        <video autoplay muted playsinline loop>
            <source src="video/semihvideo.mp4" type="video/mp4">
            Tarayıcınız video etiketini desteklemiyor.
        </video>
        <div class="overlay"></div>
        <div class="scroll-down" onclick="document.getElementById('personal').scrollIntoView({behavior:'smooth'});">
            ⬇ Aşağı Kaydır
        </div>
    </section>

    <!-- Personal Statement -->
    <section id="personal" class="personal">
        <p>Semih Fazlıoğlu | 16 | Tekirdağ</p>
    </section>

    <!-- Projects Section -->
    <section class="projects">
        <h2>Projects</h2>
        <ul>
            <li>Fonksiyonlar notları (tamamlandı)</li>
            <li>Logaritma özet çalışması</li>
            <li>Kendi portfolio web sitesi (bu sayfa)</li>
            <li>Matematik kamp planı uygulaması</li>
        </ul>
    </section>

</body>
</html>
